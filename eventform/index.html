<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Event ticket form for creating event tickets.">
  <meta name="author" content="Von">
  <link rel="icon" href="icons/favicon.ico">
  <link rel="stylesheet" href="eventform.css">
  <script src="eventform.js" defer></script>
  <title>Event Ticket Form</title>
</head>
<body>
  <main>
    <section class="form-container">
        
        <form id="event-form">
        <h1>Event Ticket</h1>
        <div class="formElement">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" required>
        </div>

        <div class="formElement">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" required>
        </div>

        <div class="formElement" id="emailElement">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="formElement">
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="">Choose one</option>
            <option value="guest">Guest</option>
            <option value="student">Student</option>
          </select>
        </div>

        <div class="formElement">
          <label for="event-date">Event Date</label>
          <input type="date" id="event-date" name="event-date" required>
        </div>

        <div class="formElement hidden" id="studentIDElement">
          <label for="studentID">Student ID</label>
          <input type="text" id="studentID" name="studentID"  inputmode="numeric" 
  maxlength="9" pattern="[0-9]{9}">
        </div>

          <button type="submit">Create Ticket</button>
          <div id="error-messages">
            <p class="hidden">Please enter a valid 9-digit student ID.</p>
            <p class="hidden">Please enter a valid 9-digit student ID.</p>
          </div>
          <div id="ticket">
            
          </div>
        </form>
    </section>
  </main>
</body>
</html>
