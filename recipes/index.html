
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Recipes">
  <meta property="og:description" content="A collection of recipes.">
  <meta property="og:url" content="https://example.com/recipes/">
  <meta property="og:image" content="social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recipes">
  <meta name="twitter:description" content="A collection of recipes.">
  <meta name="twitter:image" content="social-preview-image.png">

  <!-- One favicon (ICO works everywhere) -->
  <link rel="icon" href="/favicon.ico">
  <!-- One Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="title-card">
        <img src="images/recipe-book.png" alt="Recipe book icon">
        <h1>RecipeBook</h1>
    </div>
  
  <form class="search-bar" action="#" method="get">
    <label for="recipe-search" class="hidden">Search recipes</label>
    <input type="search" id="recipe-search" name="q" placeholder="Find a recipe" aria-label="Search recipes">
    <button type="submit"><img src="images/search.svg" alt="Search icon"></button>
  </form>
  <hr>
    <main>
        <section class="recipe-list">
        <article class="recipe-card">
            <img src="images/apple-crisp.jpg" alt="Apple Crisp">
        <div class="recipe-info">
            <button type="button" class="tag">Dessert</button>
            <h2>Apple Crisp</h2>
            <span
    class="rating"
    role="img"
    aria-label="Rating: 4 out of 5 stars"
    >
    <span aria-hidden="true" class="icon-star">⭐</span>
    <span aria-hidden="true" class="icon-star">⭐</span>
    <span aria-hidden="true" class="icon-star">⭐</span>
    <span aria-hidden="true" class="icon-star">⭐</span>
    <span aria-hidden="true" class="icon-star-empty">☆</span>
</span>

            <p class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>
        </article>
    </section>
    </main>



  <script src="script.js" defer></script>

    <footer>
    
<div class="social">
  <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
  <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
  <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
  <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
</div>                  
                

    
  
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                       
</footer>


</body>

</html>
